<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pharmacy Data</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js"></script>
</head>
<body>
    <h1>Pharmacy Data Sync</h1>
    <div id="pharmacy-data"></div>
    <script>
        const firebaseConfig = {
            apiKey: 'YOUR_API_KEY',
            authDomain: 'YOUR_AUTH_DOMAIN',
            databaseURL: 'YOUR_DATABASE_URL',
            projectId: 'YOUR_PROJECT_ID',
            storageBucket: 'YOUR_STORAGE_BUCKET',
            messagingSenderId: 'YOUR_MESSAGING_SENDER_ID',
            appId: 'YOUR_APP_ID'
        };

        // Initialize Firebase
        const app = firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const dataDisplay = document.getElementById('pharmacy-data');

        // Sync data from database
        database.ref('pharmacy').on('value', (snapshot) => {
            const data = snapshot.val();
            let htmlContent = '';

            for (let key in data) {
                htmlContent += `<p>${key}: ${data[key]}</p>`;
            }

            dataDisplay.innerHTML = htmlContent;
        });
    </script>
</body>
</html>
